  }
  if (!found) return { ll: null, exact: false, municipi: raw.municipality || raw.municipio || raw.poblacion || '' };
  const disp = (raw.municipality || raw.municipio || raw.poblacion || name).replace(/\b\w/g, (c) => c.toUpperCase());
  // centre del municipi (sense jitter); el desplaçament en espiral es fa després
  return { ll: [found[0], found[1]], exact: false, base: name, municipi: disp };
}

// Reparteix en espiral els immobles que cauen al mateix centre de municipi,
// perquè no s'apilin i es puguin obrir un a un al mapa.
function spreadOnMap(mapped) {
  const groups = {};
  mapped.forEach((p) => {
    if (!p.ll || p._exact) return;
    const key = p._base || (p.ll[0].toFixed(3) + ',' + p.ll[1].toFixed(3));
    (groups[key] = groups[key] || []).push(p);
  });
  Object.values(groups).forEach((arr) => {
    if (arr.length <= 1) return;
    const [cLat, cLng] = arr[0].ll;
    const lngScale = 1 / Math.cos((cLat * Math.PI) / 180);
    // anells concèntrics: 1 al centre, 6, 12, 18… al voltant; pas ~320 m
    let placed = 0, ring = 0;
    while (placed < arr.length) {
      const inRing = ring === 0 ? 1 : ring * 6;
      const rMeters = ring * 320;
      const dDeg = rMeters / 111000; // metres → graus lat
      for (let k = 0; k < inRing && placed < arr.length; k++, placed++) {
        const ang = (k / inRing) * 2 * Math.PI + ring * 0.6;
        const p = arr[placed];
        p.ll = ring === 0 ? [cLat, cLng]
          : [cLat + dDeg * Math.sin(ang), cLng + dDeg * Math.cos(ang) * lngScale];
      }
      ring++;
    }
  });
  return mapped;
}

// Mapeig del tipus d'immoble d'Apify (Idealista) als tipus interns
const APIFY_TYPE = {
  flat: 'pis', studio: 'pis', duplex: 'pis', loft: 'pis', apartment: 'pis',
  penthouse: 'atic', atico: 'atic',
  chalet: 'xalet', villa: 'xalet',
  house: 'casa', countryhouse: 'casa', 'country-house': 'casa', semidetached: 'casa', terraced: 'casa',
  land: 'parcela', plot: 'parcela',
  premise: 'local', office: 'local', garage: 'local', storage: 'nau', industrial: 'nau',
};
function apifyType(raw) {
  const t = String(raw.propertyType || raw.detailedType?.typology || '').toLowerCase().replace(/\s+/g, '');
  if (APIFY_TYPE[t]) return APIFY_TYPE[t];
  return inferType(raw.address || raw.titulo);
}
function apifyFeatures(raw) {
  const f = raw.features || {};
  const out = [];
  if (f.hasSwimmingPool) out.push('piscina');
  if (f.hasGarden) out.push('jardi');
  if (f.hasTerrace) out.push('terrassa');
  if (f.hasLift || f.hasElevator) out.push('ascensor');
  if (f.hasStorageRoom || f.hasBoxRoom) out.push('traster');
  if (f.hasAirConditioning) out.push('aire');
  if (raw.parkingSpace && raw.parkingSpace.hasParkingSpace) out.push('garatge');
  return out;
}
function apifyPhotos(raw) {
  const imgs = raw.multimedia && Array.isArray(raw.multimedia.images)
    ? raw.multimedia.images.map((im) => im && im.url).filter(Boolean) : [];
  if (imgs.length) return imgs;
  return raw.thumbnail ? [raw.thumbnail] : [];
}

function mapPropiedad(raw, i) {
  // Detecta el format Apify (Idealista) pels seus camps característics
  const isApify = raw.propertyType != null || raw.address != null || raw.size != null || raw.multimedia != null;

  if (isApify) {
    const type = apifyType(raw);
    const geo = geocode(raw);
    const photos = apifyPhotos(raw);
    const m2 = raw.size != null ? Number(raw.size) : null;
    const src = /idealista/i.test(raw.url || '') ? 'Idealista'
      : /fotocasa/i.test(raw.url || '') ? 'Fotocasa'
      : /habitaclia/i.test(raw.url || '') ? 'Habitaclia' : 'Idealista';
    const op = /alquiler|lloguer|rent/i.test(raw.operation || raw.url || '') ? 'lloguer' : 'venda';
    return {
      id: 'ap' + i, op, type, comarca: '', municipi: geo.municipi || '', zone: '',
      _base: geo.base || null, _exact: !!geo.exact,
      title: raw.address || raw.titulo || (TYPE_LABELS[type] + ' a ' + (geo.municipi || 'Catalunya')),
      price: Number(raw.price) || 0,
      eurM2: raw.priceByArea != null ? Number(raw.priceByArea) : null,
      m2, rooms: raw.rooms != null ? Number(raw.rooms) : null,
      baths: raw.bathrooms != null ? Number(raw.bathrooms) : null,
      floor: 0, year: null, energy: (raw.energyCertification && raw.energyCertification.energyConsumption && raw.energyCertification.energyConsumption.type) || null,
      delta: null, opportunity: false, buildable: type === 'parcela',
      isNew: !!(raw.newDevelopment), days: null,
      features: apifyFeatures(raw), source: src, sourceUrl: raw.url || null,
      web: !!raw.url, ll: geo.ll,
      description: raw.description || '',
      bg: `linear-gradient(145deg, hsl(${type === 'casa' || type === 'xalet' ? 30 : type === 'parcela' ? 110 : 210} 26% 30%), hsl(30 30% 20%))`,
      photos, fecha_scraping: raw.fecha_scraping || null,
    };
  }

  // Format JSONBin senzill (compatibilitat enrere)
  const type = inferType(raw.titulo);
  const hue = type === 'casa' ? 30 : type === 'parcela' ? 110 : 210;
  const geo = geocode(raw);
  return {
    id: 'jb' + i, op: 'venda', type, comarca: '', municipi: geo.municipi || '', zone: '',
    _base: geo.base || null, _exact: !!geo.exact,
    title: raw.titulo || 'Immoble', price: Number(raw.precio) || 0,
    m2: raw.metros != null ? Number(raw.metros) : null,
    rooms: null, baths: null, floor: 0, year: null, energy: null,
    delta: null, opportunity: false, buildable: type === 'parcela',
    isNew: false, days: diesDes(raw.fecha_scraping),
    features: [], source: raw.portal || 'Portal', sourceUrl: raw.url || null,
    web: !!raw.url, ll: geo.ll,
    bg: `linear-gradient(145deg, hsl(${hue} 26% 30%), hsl(30 30% 20%))`,
    photos: [], fecha_scraping: raw.fecha_scraping || null,
  };
}

function App() {
  const [filters, setFilters] = useState(DEFAULT_FILTERS);
  const [sort, setSort] = useState('rellevancia');
  const [theme, setTheme] = useState(() => load('theme', 'dark'));
  const [view, setView] = useState(() => load('view', 'split'));
  const [activeId, setActiveId] = useState(null);
  const [hoverId, setHoverId] = useState(null);
  const [detailId, setDetailId] = useState(null);
  const [favs, setFavs] = useState(() => new Set(load('favs', [])));
  const [photoOverrides, setPhotoOverrides] = useState(() => load('photos', {}));
  const [layers, setLayers] = useState({ heat: true });
  const [drawing, setDrawing] = useState(false);
  const [poly, setPoly] = useState(null); // [[x,y],...] en coords del mapa
  const [calcSeed, setCalcSeed] = useState(null); // obre la calculadora de construcció
  const [alertModal, setAlertModal] = useState(null); // {filters} | {property}
  const [alerts, setAlerts] = useState(() => load('alerts', []));
  const [bellOpen, setBellOpen] = useState(false);
  const [sourcesOpen, setSourcesOpen] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncDone, setSyncDone] = useState(0);
  const [lastSync, setLastSync] = useState(() => load('lastSync', null));
  const [lastStats, setLastStats] = useState(null);
  const [dataVersion, setDataVersion] = useState(0);
  const [dataset, setDataset] = useState(PROPERTIES);
  const [apiEndpoint, setApiEndpoint] = useState(() => load('apiEndpoint', ''));
  const [apiInfo, setApiInfo] = useState(null); // {total, source, ts} quan hi ha API en viu
  // --- Dades reals externes (JSONBin) ---
  const [propiedades, setPropiedades] = useState([]);
  const [ultimaActualizacion, setUltimaActualizacion] = useState(null);
  const [inmobUrl, setInmobUrl] = useState(() => { try { return localStorage.getItem('inmobiliario_url') || DEFAULT_INMOB_URL; } catch (e) { return DEFAULT_INMOB_URL; } });
  const [urlInput, setUrlInput] = useState('');
  const syncTimer = useRef(null);
  const [notifs, setNotifs] = useState([]);
  const [toasts, setToasts] = useState([]);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); save('theme', theme); }, [theme]);
  useEffect(() => { save('view', view); }, [view]);
  useEffect(() => { save('favs', [...favs]); }, [favs]);
  useEffect(() => { save('photos', photoOverrides); }, [photoOverrides]);
  useEffect(() => { save('alerts', alerts); }, [alerts]);

  // (Sense notificacions simulades: el sistema d'alertes s'omple amb el que l'usuari desa.)

  const items = useMemo(() => {
    let r = dataset.filter((p) => p.op === filters.op);
    const q = filters.q.trim().toLowerCase();
    if (q) r = r.filter((p) => (p.municipi + ' ' + p.comarca + ' ' + p.zone + ' ' + p.title).toLowerCase().includes(q));
    if (filters.types.length) r = r.filter((p) => filters.types.includes(p.type));
    if (filters.priceMin) r = r.filter((p) => p.price >= filters.priceMin);
    if (filters.priceMax) r = r.filter((p) => p.price <= filters.priceMax);
    if (filters.rooms) r = r.filter((p) => p.rooms >= filters.rooms);
    if (filters.m2Min) r = r.filter((p) => p.m2 != null && p.m2 >= filters.m2Min);
    if (filters.feats.length) r = r.filter((p) => filters.feats.every((f) => p.features.includes(f)));
    if (filters.energy.length) r = r.filter((p) => p.energy && filters.energy.includes(p.energy));
    if (filters.estat === 'obraNova') r = r.filter((p) => p.features.includes('obraNova') || (p.year && p.year >= 2025));
    if (filters.estat === 'segonaMa') r = r.filter((p) => !(p.features.includes('obraNova') || (p.year && p.year >= 2025)));
    if (poly && poly.length >= 3) {
      const polyXY = poly.map(([la, ln]) => [ln, la]);
      r = r.filter((p) => p.ll && pointInPoly(p.ll[1], p.ll[0], polyXY));
    }

    const s = [...r];
    if (sort === 'preu-asc') s.sort((a, b) => a.price - b.price);
    else if (sort === 'preu-desc') s.sort((a, b) => b.price - a.price);
    else if (sort === 'eurm2') s.sort((a, b) => (a.price / (a.m2 || 1)) - (b.price / (b.m2 || 1)));
    else if (sort === 'recent') s.sort((a, b) => a.days - b.days);
    else s.sort((a, b) => (b.isNew - a.isNew) || (a.delta - b.delta));
    return s;
  }, [filters, sort, poly, dataVersion, dataset]);

  // Carrega anuncis reals des del TEU backend amb llicència (Idealista API…)
  const loadFromApi = useCallback((endpoint, opts) => {
    const ep = (endpoint || '').trim();
    if (!ep) return Promise.reject(new Error('endpoint buit'));
    setSyncing(true);
    return fetchListingsFromEndpoint(ep, { operation: filters.op === 'lloguer' ? 'rent' : 'sale' })
      .then(({ items: list, source }) => {
        if (!list.length) throw new Error('El backend no ha retornat cap immoble');
        setDataset(list); setApiEndpoint(ep); save('apiEndpoint', ep);
        const info = { total: list.length, source, ts: Date.now() };
        setApiInfo(info); setLastSync(info.ts); save('lastSync', info.ts);
        setDataVersion((v) => v + 1);
        if (!opts || !opts.silent) setToasts((t) => [...t, { id: 'ta' + Date.now(), kind: 'new',
          title: 'API connectada · ' + source, body: list.length + ' immobles reals carregats' }]);
        return info;
      })
      .catch((e) => {
        if (!opts || !opts.silent) setToasts((t) => [...t, { id: 'tae' + Date.now(), kind: 'price',
          title: 'No s\'ha pogut connectar a l\'API', body: String((e && e.message) || e) }]);
        throw e;
      })
      .finally(() => setSyncing(false));
  }, [filters.op]);

  const disconnectApi = useCallback(() => {
    setApiEndpoint(''); save('apiEndpoint', ''); setApiInfo(null);
    setDataset(PROPERTIES); setDataVersion((v) => v + 1);
    setToasts((t) => [...t, { id: 'tad' + Date.now(), kind: 'new',
      title: 'API desconnectada', body: 'Tornem a la mostra real local' }]);
  }, []);

  // Si hi ha un endpoint desat, reconnecta en carregar
  useEffect(() => { const ep = load('apiEndpoint', ''); if (ep) loadFromApi(ep, { silent: true }).catch(() => {}); }, []);

  // Carrega dades reals des de la URL configurable (Apify/JSONBin) desada a localStorage
  const cargarDatos = useCallback(async () => {
    const url = localStorage.getItem('inmobiliario_url') || DEFAULT_INMOB_URL;
    if (!url) return;
    setSyncing(true);
    try {
      const r = await fetch(url, { cache: 'no-store' });
      const json = await r.json();
      const datos = json.record ?? json;
      // Apify retorna un array directament; JSONBin embolcalla a { propiedades: [...] }
      const lista = Array.isArray(datos) ? datos : (datos.propiedades ?? datos.items ?? []);
      const source = Array.isArray(datos) ? 'Apify · Idealista' : 'JSONBin';
      setPropiedades(lista);
      setUltimaActualizacion(
        (!Array.isArray(datos) && datos.ultima_actualizacion) ? datos.ultima_actualizacion : new Date().toISOString()
      );
      const mapped = spreadOnMap(lista.map(mapPropiedad));
      setDataset(mapped);
      setApiInfo({ total: mapped.length, source, ts: Date.now() });
      setLastSync(Date.now()); save('lastSync', Date.now());
      setDataVersion((v) => v + 1);
      setToasts((t) => [...t, { id: 'tj' + Date.now(), kind: 'new',
        title: 'Dades reals carregades', body: mapped.length + ' immobles · ' + source }]);
    } catch (e) {
      setToasts((t) => [...t, { id: 'tje' + Date.now(), kind: 'price',
        title: 'No s\'han pogut carregar les dades', body: String((e && e.message) || e) }]);
    } finally {
      setSyncing(false);
    }
  }, []);

  // Desa la URL del banner de configuració i carrega immediatament
  const guardarUrl = useCallback(() => {
    const v = urlInput.trim();
    if (!v) return;
    localStorage.setItem('inmobiliario_url', v);
    setInmobUrl(v);
    cargarDatos();
  }, [urlInput, cargarDatos]);

  // Carrega en obrir l'app
  useEffect(() => { cargarDatos(); }, [cargarDatos]);

  // Consulta simulada a totes les fonts (portals + agències)
  const refreshData = useCallback(() => {
    if (syncTimer.current) return;
    const ep = load('apiEndpoint', '');
    if (ep) { loadFromApi(ep).catch(() => {}); return; }
    setSyncing(true); setSyncDone(0);
    const total = SOURCES_COUNT;
    const stepMs = Math.max(12, Math.floor(1600 / total));
    let done = 0;
    syncTimer.current = setInterval(() => {
      done += 1 + Math.floor(Math.random() * 2);
      if (done >= total) {
        done = total; setSyncDone(done);
        clearInterval(syncTimer.current); syncTimer.current = null;
        const stats = syncProperties();
        setLastStats(stats); setLastSync(stats.ts); save('lastSync', stats.ts);
        setDataVersion((v) => v + 1); setSyncing(false);
        setToasts((t) => [...t, { id: 'tu' + Date.now(), kind: 'new',
          title: 'Dades revalidades · ' + SOURCES_COUNT + ' fonts',
          body: stats.total + ' immobles reals revisats · sense canvis de preu nous' }]);
      } else { setSyncDone(done); }
    }, stepMs);
  }, []);
  useEffect(() => () => { if (syncTimer.current) clearInterval(syncTimer.current); }, []);

  const onSelect = useCallback((id) => { setDetailId(id); setActiveId(id); }, []);
  const onFav = useCallback((id) => setFavs((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; }), []);
  const setPropPhotos = useCallback((id, photos) => setPhotoOverrides((o) => {
    const n = { ...o }; if (photos && photos.length) n[id] = photos; else delete n[id]; return n;
  }), []);
  const withPhotos = useCallback((p) => (p && photoOverrides[p.id])
    ? { ...p, photos: photoOverrides[p.id], userPhotos: true } : p, [photoOverrides]);
  const toggleLayer = useCallback((k) => {
    if (k === 'draw') { setDrawing((v) => { if (!v) setPoly(null); return !v; }); }
    else setLayers((l) => ({ ...l, [k]: !l[k] }));
  }, []);
  const addPoint = useCallback((pt) => setPoly((p) => [...(p || []), pt]), []);
  const finishPoly = useCallback(() => setDrawing(false), []);
  const clearPoly = useCallback(() => { setPoly(null); setDrawing(false); }, []);

  const detail = detailId ? withPhotos(dataset.find((p) => p.id === detailId)) : null;

  const saveAlert = (a) => {
    setAlerts((list) => [{ ...a }, ...list]);
    setAlertModal(null);
    setToasts((t) => [...t, { id: 'ts' + Date.now(), kind: 'new', title: 'Alerta activada', body: a.name + ' · ' + (a.freq === 'instant' ? 'avís immediat' : a.freq === 'day' ? 'resum diari' : 'resum') }]);
  };
  const createPriceAlert = (p) => {
    setAlerts((list) => [{ name: 'Baixada de preu · ' + p.municipi, freq: 'instant', auto: p.title, channels: { push: true, email: true, sms: false } }, ...list]);
    setToasts((t) => [...t, { id: 'tp' + Date.now(), kind: 'price', title: 'Alerta de baixada activada', body: 'T\'avisarem si baixa el preu de "' + p.title + '"' }]);
  };
  const onNotifClick = (n) => { setBellOpen(false); if (n.propId) onSelect(n.propId); };

  const onExport = useCallback(() => {
    const cols = ['Títol', 'Operació', 'Tipus', 'Municipi', 'Comarca', 'Zona', 'Preu', '€/m²', 'm²', 'Hab', 'Banys', 'Any', 'CEE', '%mercat', 'Font'];
    const esc = (v) => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
    const lines = items.map((p) => [p.title, p.op, TYPE_LABELS[p.type], p.municipi, p.comarca, p.zone, p.price,
      p.m2 ? Math.round(p.price / p.m2) : '', p.m2, p.rooms, p.baths, p.year || '', p.energy || '', p.delta, p.source].map(esc).join(';'));
    const csv = '\uFEFF' + cols.map(esc).join(';') + '\n' + lines.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'casafind-' + filters.op + '-' + items.length + '-immobles.csv';
    a.click();
    URL.revokeObjectURL(a.href);
    setToasts((t) => [...t, { id: 'tx' + Date.now(), kind: 'new', title: 'Exportació completada', body: items.length + ' immobles desats a CSV' }]);
  }, [items, filters.op]);

  const bellNode = (
    <BellMenu alerts={alerts} notifs={notifs} onClose={() => setBellOpen(false)}
      onOpenAlertsPanel={() => { setBellOpen(false); setAlertModal({ filters }); }}
      onNotifClick={onNotifClick} />
  );

  return (
    <div className="app">
      <Toolbar
        filters={filters} setFilters={setFilters} theme={theme} setTheme={setTheme}
        sort={sort} setSort={setSort} count={items.length} view={view} setView={setView}
        bellCount={notifs.length} onToggleBell={() => setBellOpen((v) => !v)} bellOpen={bellOpen}
        bellNode={bellNode} onSaveAlert={() => setAlertModal({ filters })} onOpenCalc={() => setCalcSeed({})} onExport={onExport}
        sourcesCount={SOURCES_COUNT} onOpenSources={() => setSourcesOpen(true)}

        syncing={syncing} lastSync={lastSync} />

      {!inmobUrl && (
        <div className="cfg-banner">
          <span className="cfg-banner-ic"><Ic.antenna size={18} /></span>
          <div className="cfg-banner-txt">
            <b>Connecta les teves dades reals</b>
            <span>Enganxa la URL del teu JSONBin amb els anuncis i prem Guardar</span>
          </div>
          <input className="cfg-banner-input" value={urlInput} onChange={(e) => setUrlInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === 'Enter') guardarUrl(); }}
            placeholder="https://api.jsonbin.io/v3/b/XXXXXXXX/latest" />
          <button className="btn-primary" onClick={guardarUrl}>Guardar</button>
        </div>

      <main className={'app-main view-' + view} onClick={() => bellOpen && setBellOpen(false)}>

            {items.length === 0 ? (
              (apiInfo && dataset.length === 0) ? (
                <div className="empty">
                  <div className="empty-ic"><Ic.antenna size={24} /></div>
                  <b>La font encara no té anuncis</b>
                  <p>{ultimaActualizacion ? 'Última comprovació: ' + fmtFecha(ultimaActualizacion) + '. ' : ''}Quan el teu scraper publiqui propietats apareixeran aquí. Prem «Actualitza» per tornar a comprovar-ho.</p>
                  <button className="btn-primary" onClick={cargarDatos} disabled={syncing}><Ic.refresh size={15} /> {syncing ? 'Actualitzant…' : 'Actualitza'}</button>
                </div>
              ) : (
                <div className="empty">
                  <div className="empty-ic"><Ic.search size={26} /></div>
                  <b>Cap immoble amb aquests filtres</b>
                  <p>Prova d'ampliar el preu o la zona, o desa una alerta i t'avisarem.</p>
                  <button className="btn-primary" onClick={() => setAlertModal({ filters })}><Ic.bell size={15} /> Desa aquesta cerca</button>

              <div className="list-grid">
                {items.map((p) => (
                  <PropertyCard key={p.id} p={withPhotos(p)} active={p.id === activeId} hover={p.id === hoverId}
                    fav={favs.has(p.id)} onHover={setHoverId} onSelect={onSelect} onFav={onFav} />
                ))}
              </div>
            )}
            <div className="list-foot">
              {apiInfo ? (
                <><b>{items.length} immobles reals</b> carregats des de {apiInfo.source}.{ultimaActualizacion ? ' Última actualització de les dades: ' + fmtFecha(ultimaActualizacion) + '.' : ''} Prem «Actualitza» per tornar a carregar.</>
              ) : (
                <><b>{items.length} immobles reals</b> del Vallès Oriental, recollits d'un barreig web (maig 2026): preu, m², habitacions i ubicació factuals, amb la <b>font citada</b> a cada targeta.
                <br />No es reprodueixen fotos ni textos dels anuncis (protegits per drets d'autor); les imatges són d'estoc genèric per tipus. Connecta la teva API (botó «fonts») per omplir-la amb dades en viu.</>
              )}

          <CatMap items={items} activeId={activeId} hoverId={hoverId} theme={theme}
            onHover={setHoverId} onSelect={onSelect} layers={layers} onToggleLayer={toggleLayer}
            drawing={drawing} polygon={poly} onAddPoint={addPoint} onFinishPoly={finishPoly} onClearPolygon={clearPoly} />

        <button className="fab fab-map" onClick={() => setView('map')}><Ic.map size={18} /> Mapa</button>
        <button className="fab fab-list" onClick={() => setView('list')}><Ic.list size={18} /> Llista</button>
      </main>

      {detail && (
        <PropertyDetail p={detail} fav={favs.has(detail.id)} onFav={onFav}
          onClose={() => { setDetailId(null); setActiveId(null); }} onCreateAlert={createPriceAlert}
          onOpenCalc={() => setCalcSeed(detail)} setPhotos={setPropPhotos} />
      )}

      {calcSeed !== null && (
        <ConstructionCalc seed={calcSeed} onClose={() => setCalcSeed(null)} />
      )}

      {alertModal && (
        <CreateAlertModal filters={alertModal.filters || filters}
          onClose={() => setAlertModal(null)} onSave={saveAlert} />
      )}

      {sourcesOpen && (
        <SourcesModal onClose={() => setSourcesOpen(false)} syncing={syncing} syncDone={syncDone}
          lastSync={lastSync} lastStats={lastStats} onRefresh={refreshData}
          apiEndpoint={apiEndpoint} apiInfo={apiInfo} onConnectApi={loadFromApi} onDisconnectApi={disconnectApi} />
      )}

      <div className="toast-stack">
        {toasts.map((t) => (
          <Toast key={t.id} t={t} onClose={() => setToasts((ts) => ts.filter((x) => x.id !== t.id))} />
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
