<!DOCTYPE html>
<html lang="ca" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>CasaFind Catalunya</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Schibsted+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
<style id="casafind-styles">
/* ============================================================
   CasaFind Catalunya — Component styles
   ============================================================ */

.app { display: flex; flex-direction: column; height: 100vh; }

/* shared buttons ------------------------------------------------ */
.btn-primary, .btn-ghost {
  display: inline-flex; align-items: center; gap: 8px; justify-content: center;
  border-radius: var(--r-sm); font-weight: 700; font-size: 14px;
  padding: 11px 16px; border: 1px solid transparent; transition: .18s var(--ease);
  white-space: nowrap;
}
.btn-primary { background: var(--primary); color: var(--primary-ink); box-shadow: 0 6px 18px -6px var(--primary-soft); }
.btn-primary:hover { background: var(--primary-strong); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-ghost { background: var(--surface-3); color: var(--txt); border-color: var(--line); }
.btn-ghost:hover { background: var(--surface-hover); border-color: var(--line-strong); }

.icon-btn { display: inline-grid; place-items: center; width: 38px; height: 38px; border-radius: 10px;
  background: transparent; border: 1px solid transparent; color: var(--txt-2); transition: .16s var(--ease); }
.icon-btn:hover { background: var(--surface-hover); color: var(--txt); }
.icon-btn.round { border-radius: 50%; }
.icon-btn.round.active, .icon-btn.active { background: var(--primary-soft); color: var(--primary); }
.icon-btn.glass { background: rgba(10,14,22,.5); color: #fff; backdrop-filter: blur(8px); width: 36px; height: 36px; }
.icon-btn.glass:hover { background: rgba(10,14,22,.72); }
.icon-btn.glass.on { background: var(--accent); color: #fff; }

/* ============================================================
   TOOLBAR
   ============================================================ */
.toolbar { position: relative; z-index: 40; background: var(--surface); border-bottom: 1px solid var(--line);
  box-shadow: 0 1px 0 var(--line); flex: none; }
.tb-row { display: flex; align-items: center; gap: 16px; padding: 0 22px; }
.tb-main { height: 66px; }
.tb-filters { height: 56px; border-top: 1px solid var(--line); gap: 12px; }

.brand { display: flex; align-items: center; gap: 11px; flex: none; }
.brand-mark { width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center;
  background: linear-gradient(145deg, var(--primary), var(--primary-strong)); color: var(--primary-ink);
  box-shadow: 0 8px 20px -8px var(--primary-soft); }
.brand-txt { font-family: var(--font-display); font-weight: 800; font-size: 19px; letter-spacing: -.3px; line-height: 1; }
.brand-cat { display: block; font-size: 11.5px; font-weight: 600; letter-spacing: 2.4px; text-transform: uppercase;
  color: var(--primary); margin-top: 3px; font-family: var(--font-ui); }

.search { flex: 1; max-width: 560px; display: flex; align-items: center; gap: 10px; height: 44px;
  padding: 0 8px 0 16px; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-pill);
  color: var(--txt-3); transition: .18s var(--ease); }
.search:focus-within { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 4px var(--primary-soft); }
.search-input { flex: 1; background: none; border: none; outline: none; color: var(--txt); font-size: 15px; font-family: inherit; }
.search-input::placeholder { color: var(--txt-3); }
.search-draw { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center;
  background: var(--surface-3); color: var(--txt-2); border: none; transition: .16s; }
.search-draw:hover { background: var(--primary-soft); color: var(--primary); }

.seg { position: relative; display: flex; background: var(--surface-2); border: 1px solid var(--line);
  border-radius: var(--r-pill); padding: 3px; flex: none; }
.seg button { position: relative; z-index: 2; border: none; background: none; color: var(--txt-2);
  font-weight: 700; font-size: 14px; padding: 8px 18px; border-radius: var(--r-pill); transition: color .2s; cursor: pointer; }
.seg button.on { color: var(--primary-ink); }
.op-seg .seg-glow { position: absolute; z-index: 1; top: 3px; left: 3px; width: calc(50% - 3px); height: calc(100% - 6px);
  background: var(--primary); border-radius: var(--r-pill); transition: transform .28s var(--ease-out); box-shadow: var(--shadow-sm); }

.tb-actions { display: flex; align-items: center; gap: 8px; flex: none; margin-left: auto; }
.bell-wrap { position: relative; }
.bell-badge { position: absolute; top: -2px; right: -2px; min-width: 18px; height: 18px; padding: 0 4px;
  background: var(--accent); color: #fff; border-radius: 99px; font-size: 11px; font-weight: 800;
  display: grid; place-items: center; border: 2px solid var(--surface); }
.avatar { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--line-strong);
  background: linear-gradient(145deg, var(--surface-3), var(--surface-2)); color: var(--txt); font-weight: 800; font-size: 13px; }

/* filter chips */
.tb-filters { overflow: visible; }
.chips { display: flex; align-items: center; gap: 9px; flex: 1; min-width: 0; }
.chip-wrap { position: relative; }
.chip { display: inline-flex; align-items: center; gap: 6px; height: 38px; padding: 0 13px;
  background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-sm);
  color: var(--txt); font-weight: 600; font-size: 13.5px; transition: .15s var(--ease); white-space: nowrap; }
.chip:hover { border-color: var(--line-strong); background: var(--surface-hover); }
.chip.active { border-color: var(--primary); color: var(--primary); background: var(--primary-soft); }
.chip.open { border-color: var(--primary); }
.chip svg { opacity: .7; }
.chip.more { gap: 7px; }
.chip-count { background: var(--primary); color: var(--primary-ink); border-radius: 99px; min-width: 18px; height: 18px;
  display: grid; place-items: center; font-size: 11px; font-weight: 800; padding: 0 4px; }
.chip-clear { display: inline-flex; align-items: center; gap: 5px; height: 38px; padding: 0 12px; background: none;
  border: none; color: var(--txt-3); font-weight: 600; font-size: 13px; border-radius: var(--r-sm); }
.chip-clear:hover { color: var(--accent); background: var(--accent-soft); }

.tb-filters-right { display: flex; align-items: center; gap: 12px; flex: none; }
.result-count { color: var(--txt-2); font-size: 13.5px; }
.result-count b { color: var(--txt); font-weight: 800; }
.save-alert-btn { display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 14px;
  border-radius: var(--r-sm); background: var(--accent-soft); color: var(--accent); border: 1px solid transparent;
  font-weight: 700; font-size: 13.5px; transition: .16s; }
.save-alert-btn:hover { background: var(--accent); color: #fff; }
.save-alert-btn.export { background: var(--surface-3); color: var(--txt-2); }
.save-alert-btn.export:hover { background: var(--surface-hover); color: var(--txt); }

/* Fonts + Actualitza */
.src-btn { display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 13px;
  border-radius: var(--r-sm); background: var(--surface-3); color: var(--txt-2); border: 1px solid var(--line);
  font-weight: 700; font-size: 13.5px; transition: .16s; }
.src-btn:hover { background: var(--surface-hover); color: var(--txt); border-color: var(--line-strong); }
.src-btn svg { color: var(--primary); }
.refresh-btn { display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 14px;
  border-radius: var(--r-sm); background: var(--primary-soft); color: var(--primary); border: 1px solid transparent;
  font-weight: 700; font-size: 13.5px; transition: .16s; }
.refresh-btn:hover { background: var(--primary); color: var(--primary-ink); }
.refresh-btn:disabled { opacity: .85; cursor: default; }
.refresh-btn.syncing svg, .refresh-btn.big.syncing svg { animation: spin 0.9s linear infinite; }
.refresh-btn.big { height: 40px; padding: 0 18px; font-size: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.sort-wrap { position: relative; }
.chip.sort { background: transparent; border-color: transparent; color: var(--txt-2); }
.chip.sort:hover { background: var(--surface-hover); }

.view-seg { padding: 3px; }
.view-seg button { display: grid; place-items: center; width: 36px; padding: 7px 0; color: var(--txt-3); border-radius: 8px; }
.view-seg button.on { background: var(--surface); color: var(--primary); box-shadow: var(--shadow-sm); }

/* popovers */
.pop-backdrop { position: fixed; inset: 0; z-index: 50; }
.popover { position: absolute; z-index: 60; top: calc(100% + 8px); left: 0; min-width: 240px;
  background: var(--surface); border: 1px solid var(--line-strong); border-radius: var(--r-md);
  box-shadow: var(--shadow-lg); padding: 14px; animation: float-in .16s var(--ease-out); }
.popover.right { left: auto; right: 0; }
.pop-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--txt-3);
  margin: 2px 0 10px; }
.pop-title:not(:first-child) { margin-top: 16px; }
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.type-opt, .feat-opt { display: flex; align-items: center; gap: 8px; padding: 9px 11px; border-radius: var(--r-xs);
  background: var(--surface-2); border: 1px solid var(--line); color: var(--txt); font-weight: 600; font-size: 13.5px;
  text-align: left; transition: .14s; }
.type-opt:hover, .feat-opt:hover { border-color: var(--line-strong); }
.type-opt.on, .feat-opt.on { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
.type-check { width: 16px; height: 16px; border-radius: 5px; border: 1.6px solid var(--line-strong); display: grid;
  place-items: center; flex: none; color: var(--primary-ink); }
.type-opt.on .type-check { background: var(--primary); border-color: var(--primary); }
.feat-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.feat-opt { padding: 8px 12px; }
.pop-price { min-width: 300px; }
.range-row { display: flex; align-items: flex-end; gap: 8px; }
.range-dash { color: var(--txt-3); padding-bottom: 11px; }
.field { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.field-lbl { font-size: 12px; font-weight: 600; color: var(--txt-2); }
.field-input { height: 40px; padding: 0 12px; background: var(--surface-2); border: 1px solid var(--line);
  border-radius: var(--r-xs); color: var(--txt); font-size: 14px; font-family: inherit; outline: none; transition: .15s; width: 100%; }
.field-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
.quick-prices { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.quick-prices button { padding: 7px 11px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 99px;
  color: var(--txt-2); font-weight: 600; font-size: 12.5px; transition: .14s; }
.quick-prices button:hover { border-color: var(--line-strong); color: var(--txt); }
.quick-prices button.on { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
.pill-row { display: flex; gap: 6px; }
.pill-opt { min-width: 44px; padding: 9px 14px; background: var(--surface-2); border: 1px solid var(--line);
  border-radius: var(--r-xs); color: var(--txt); font-weight: 700; font-size: 13.5px; transition: .14s; }
.pill-opt:hover { border-color: var(--line-strong); }
.pill-opt.on { background: var(--primary); border-color: var(--primary); color: var(--primary-ink); }
.energy-wrap { display: flex; gap: 5px; }
.energy-opt { width: 36px; height: 36px; border-radius: var(--r-xs); background: var(--surface-2); border: 1px solid var(--line);
  color: var(--txt); font-weight: 800; font-size: 13px; transition: .14s; }
.energy-opt.on { background: var(--primary); border-color: var(--primary); color: var(--primary-ink); }
.pop-more { min-width: 320px; }
.pop-clear { margin-top: 14px; width: 100%; padding: 9px; background: var(--surface-2); border: 1px solid var(--line);
  border-radius: var(--r-xs); color: var(--txt-2); font-weight: 600; font-size: 13px; }
.pop-clear:hover { color: var(--accent); }
.pop-sort { min-width: 220px; padding: 8px; }
.sort-opt { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 10px 12px;
  background: none; border: none; border-radius: var(--r-xs); color: var(--txt); font-weight: 600; font-size: 14px; text-align: left; }
.sort-opt:hover { background: var(--surface-2); }
.sort-opt.on { color: var(--primary); }

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
.app-main { flex: 1; display: flex; min-height: 0; position: relative; }
.list-pane { display: flex; flex-direction: column; min-height: 0; transition: width .3s var(--ease); }
.map-pane { min-height: 0; position: relative; transition: width .3s var(--ease); }
.view-split .list-pane { width: 46%; }
.view-split .map-pane { width: 54%; }
.view-list .list-pane { width: 100%; }
.view-list .map-pane { width: 0; overflow: hidden; }
.view-map .list-pane { width: 0; overflow: hidden; }
.view-map .map-pane { width: 100%; }

.list-scroll { overflow-y: auto; height: 100%; padding: 20px; }
.list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 18px; align-content: start; }
.view-list .list-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
.list-foot { margin-top: 26px; padding-top: 18px; border-top: 1px solid var(--line); color: var(--txt-3);
  font-size: 11.5px; line-height: 1.7; }

.empty { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px;
  padding: 70px 24px; color: var(--txt-2); }
.empty-ic { width: 56px; height: 56px; border-radius: 50%; background: var(--surface-2); display: grid;
  place-items: center; color: var(--txt-3); margin-bottom: 6px; }
.empty b { color: var(--txt); font-size: 17px; }
.empty p { max-width: 320px; font-size: 14px; line-height: 1.6; margin: 0 0 8px; }

/* ============================================================
   PROPERTY CARD
   ============================================================ */
.pcard { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden;
  cursor: pointer; transition: transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s; }
.pcard:hover, .pcard.hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--line-strong); }
.pcard.active { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary), var(--shadow-md); }
.pcard-photo { position: relative; aspect-ratio: 16 / 11; background-size: cover; background-position: center; overflow: hidden; }
.pcard-photo-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.pcard-veil { position: absolute; inset: 0; background: var(--photo-veil); }
.pcard-ph { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.pcard-ph::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.34)); }
.pcard-ph-ic { position: relative; z-index: 1; width: 58px; height: 58px; border-radius: 16px; display: grid; place-items: center;
  background: color-mix(in srgb, var(--surface) 70%, transparent); box-shadow: var(--shadow-sm); }
.pcard-ph-note { position: relative; z-index: 1; font-size: 11px; font-weight: 700; letter-spacing: .3px;
  color: rgba(255,255,255,.82); text-transform: uppercase; }
.pcard-photoholder { position: absolute; bottom: 9px; left: 11px; font-size: 10.5px; font-weight: 600; letter-spacing: .4px;
  color: rgba(255,255,255,.62); text-transform: uppercase; }
.pcard-top { position: absolute; top: 11px; left: 11px; right: 11px; display: flex; align-items: flex-start; justify-content: space-between; }
.pcard-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.tag-new, .tag-op, .tag-build, .tag-opp, .tag-web { display: inline-flex; align-items: center; gap: 5px; height: 24px; padding: 0 9px;
  border-radius: 99px; font-size: 11.5px; font-weight: 700; backdrop-filter: blur(6px); }
.tag-new { background: var(--primary); color: var(--primary-ink); }
.tag-web { background: #2563eb; color: #fff; }
.tag-web svg { color: #fff; }
.tag-opp { background: var(--accent); color: #fff; box-shadow: 0 0 0 3px var(--accent-soft); animation: pulse-soft 1.5s infinite; }
.tag-opp svg { color: #fff; }
.tag-new-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary-ink); animation: pulse-soft 1.4s infinite; }
.tag-op { background: rgba(10,14,22,.62); color: #fff; }
.tag-build { background: rgba(242,114,75,.92); color: #fff; }
.fav-btn { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; border: none;
  background: rgba(10,14,22,.5); color: #fff; backdrop-filter: blur(6px); transition: .16s; }
.fav-btn:hover { background: rgba(10,14,22,.75); transform: scale(1.08); }
.fav-btn.on { color: var(--accent); }
.pcard-photo-nav { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-between;
  padding: 0 8px; opacity: 0; transition: opacity .18s; }
.pcard:hover .pcard-photo-nav { opacity: 1; }
.pcard-photo-nav button { width: 30px; height: 30px; border-radius: 50%; border: none; background: rgba(10,14,22,.55);
  color: #fff; display: grid; place-items: center; backdrop-filter: blur(6px); }
.pcard-photo-nav button:hover { background: rgba(10,14,22,.8); }
.pcard-dots { position: absolute; bottom: 9px; right: 11px; display: flex; gap: 4px; }
.pcard-dots span { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.45); }
.pcard-dots span.on { background: #fff; width: 14px; border-radius: 99px; }

.pcard-body { padding: 14px 15px 15px; }
.pcard-priceline { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.pcard-price { font-family: var(--font-display); font-size: 21px; font-weight: 800; letter-spacing: -.5px; white-space: nowrap; }
.pcard-eurm2 { color: var(--txt-3); font-size: 12.5px; font-weight: 600; margin-top: 1px; }
.value-badge { display: inline-flex; align-items: center; gap: 4px; margin-top: 9px; padding: 4px 9px; border-radius: 99px;
  font-size: 12px; font-weight: 700; }
.value-badge.sm { font-size: 11px; padding: 3px 8px; }
.value-badge.good { background: var(--good-soft); color: var(--good); }
.value-badge.warn { background: var(--warn-soft); color: var(--warn); }
.value-badge.bad { background: var(--bad-soft); color: var(--bad); }
.energy-tag { width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center; color: #fff;
  font-weight: 800; font-size: 13px; flex: none; }
.pcard-title { font-size: 15px; font-weight: 700; line-height: 1.35; margin: 11px 0 6px; text-wrap: pretty;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.pcard-loc { display: flex; align-items: center; gap: 5px; color: var(--txt-2); font-size: 13px; font-weight: 500; }
.pcard-loc svg { color: var(--txt-3); flex: none; }
.pcard-specs { display: flex; align-items: center; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
.spec { display: inline-flex; align-items: center; gap: 5px; color: var(--txt-2); font-size: 13px; }
.spec svg { color: var(--txt-3); }
.spec b { color: var(--txt); font-weight: 700; }
.spec-type { margin-left: auto; font-size: 11.5px; font-weight: 700; color: var(--txt-2); background: var(--surface-3);
  padding: 4px 9px; border-radius: 99px; }
.type-chip { margin-left: auto; display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700;
  padding: 4px 10px 4px 8px; border-radius: 99px; line-height: 1; box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--tc) 30%, transparent); }
.type-chip svg { flex: none; }
.pcard-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 13px; padding-top: 12px;
  border-top: 1px solid var(--line); }
.src-chip { font-size: 11px; font-weight: 700; color: var(--txt-2); background: var(--surface-3); padding: 4px 9px; border-radius: 6px; }
.src-chip.web { display: inline-flex; align-items: center; gap: 5px; background: rgba(37,99,235,.14); color: #2563eb;
  text-decoration: none; transition: .15s; }
.src-chip.web:hover { background: #2563eb; color: #fff; }
.src-chip.web svg:last-child { opacity: .65; }
.src-chip.sm { font-size: 10.5px; padding: 3px 7px; }
.pcard-days { font-size: 12px; color: var(--txt-3); font-weight: 600; }

/* ============================================================
   MAP
   ============================================================ */
.map-pane { background: radial-gradient(120% 120% at 70% 10%, var(--sea), var(--sea-2)); }
.map-wrap { position: absolute; inset: 0; overflow: hidden; }
.map-svg { position: absolute; inset: 0; }
[data-theme="dark"] .heat-layer { mix-blend-mode: screen; }
[data-theme="light"] .heat-layer { mix-blend-mode: multiply; }
.map-overlay { position: absolute; inset: 0; pointer-events: none; }
.map-overlay > * { pointer-events: auto; }

.city-lbl { position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; color: var(--txt-2); letter-spacing: .3px; text-shadow: 0 1px 6px var(--sea-2);
  pointer-events: none; white-space: nowrap; }
.city-lbl.big { font-size: 13px; color: var(--txt); font-weight: 800; }
.city-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--txt-3); }
.city-lbl.big .city-dot { width: 6px; height: 6px; background: var(--txt-2); }

.pin { position: absolute; transform: translate(-50%, -50%); display: inline-flex; align-items: center; gap: 4px;
  height: 28px; padding: 0 9px 0 5px; background: var(--surface); border: 1px solid var(--line-strong);
  border-radius: 99px; box-shadow: var(--shadow-sm); cursor: pointer; transition: .15s var(--ease);
  font-weight: 800; font-size: 12.5px; color: var(--txt); }
.pin:hover, .pin.hover { transform: translate(-50%, -50%) scale(1.08); border-color: var(--pin-type, var(--primary)); z-index: 50; }
.pin.active { background: var(--primary); border-color: var(--primary); color: var(--primary-ink); transform: translate(-50%, -50%) scale(1.14); }
.pin.active .pin-glyph { stroke: var(--primary-ink) !important; }
.pin.active .pin-glyph-wrap { background: rgba(255,255,255,.22); }
.pin.active .pin-new { border-color: var(--primary); }

/* icona de tipus dins del pin (pis / casa / terreny) */
.pin-glyph-wrap { width: 19px; height: 19px; border-radius: 50%; flex: none; display: grid; place-items: center;
  background: color-mix(in srgb, var(--pin-type) 16%, transparent); }
.pin-glyph { width: 13px; height: 13px; display: block; }
.pin-eur { font-weight: 700; opacity: .7; margin-left: 1px; }
.pin-new { position: absolute; top: -3px; right: -3px; width: 9px; height: 9px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--surface); }

/* ---- Oportunitats: pin ressaltat i parpellejant ---- */
.pin.opp { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 22px -8px rgba(242,114,75,.6); }
.pin.opp .pin-glyph-wrap { background: var(--accent); }
.pin.opp .pin-glyph { stroke: #fff !important; }
.pin.opp.active .pin-glyph { stroke: var(--primary-ink) !important; }
.pin-ring { position: absolute; inset: -3px; border-radius: 99px; border: 2px solid var(--accent);
  pointer-events: none; animation: opp-ring 1.8s var(--ease-out) infinite; }
.pin-flame { position: absolute; top: -7px; right: -7px; width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); color: #fff; font-size: 9px; line-height: 16px; text-align: center;
  border: 2px solid var(--surface); box-shadow: var(--shadow-sm); animation: opp-blink 1.4s var(--ease) infinite; }
@keyframes opp-ring { 0% { transform: scale(.9); opacity: .85; } 70%,100% { transform: scale(1.7); opacity: 0; } }
@keyframes opp-blink { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .45; transform: scale(.85); } }

/* ---- Dades reals del barreig web ---- */
.pin.web { border-color: #2563eb; box-shadow: 0 0 0 1px #2563eb, var(--shadow-md); }
.pin.web .pin-glyph-wrap { background: #2563eb; }
.pin.web .pin-glyph { stroke: #fff !important; }
.pin.web.active .pin-glyph { stroke: var(--primary-ink) !important; }
.pin-web { position: absolute; top: -5px; right: -5px; width: 13px; height: 13px; border-radius: 50%;
  background: #2563eb; border: 2px solid var(--surface); display: grid; place-items: center; }
.pin-web::after { content: ''; width: 4px; height: 4px; border-radius: 50%; background: #fff; }

.map-ctrl { position: absolute; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-sm);
  box-shadow: var(--shadow-sm); display: flex; flex-direction: column; overflow: hidden; }
.map-ctrl-zoom { top: 16px; right: 16px; }
.map-ctrl button { width: 38px; height: 38px; display: grid; place-items: center; background: none; border: none; color: var(--txt); }
.map-ctrl button:hover { background: var(--surface-hover); }
.map-ctrl-div { height: 1px; background: var(--line); }

.map-tools { position: absolute; top: 16px; left: 16px; display: flex; gap: 8px; }
.map-tool { display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 13px; background: var(--surface);
  border: 1px solid var(--line); border-radius: var(--r-sm); box-shadow: var(--shadow-sm); color: var(--txt);
  font-weight: 600; font-size: 13px; transition: .15s; }
.map-tool:hover { border-color: var(--line-strong); }
.map-tool.on { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
.map-tool.ghost { padding: 0; width: 38px; justify-content: center; color: var(--txt-3); }

.map-legend { position: absolute; bottom: 16px; left: 16px; background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-sm); box-shadow: var(--shadow-sm); padding: 11px 13px; width: 188px; }
.map-legend-title { font-size: 11px; font-weight: 700; color: var(--txt-2); margin-bottom: 8px; }
.map-legend-bar { height: 8px; border-radius: 99px; background: linear-gradient(90deg, var(--heat-0), var(--heat-1), var(--heat-2), var(--heat-3), var(--heat-4)); }
.map-legend-scale { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10.5px; color: var(--txt-3); font-weight: 600; }

/* llegenda de tipus d'immoble + oportunitats */
.map-keys { position: absolute; bottom: 116px; left: 16px; width: 188px; background: var(--surface);
  border: 1px solid var(--line); border-radius: var(--r-sm); box-shadow: var(--shadow-sm);
  padding: 10px 13px; display: flex; flex-direction: column; gap: 7px; }
.map-key { display: flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 600; color: var(--txt-2); }
.map-key-dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
.map-key-dot.opp { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); animation: opp-blink 1.4s var(--ease) infinite; }
.map-key-dot.web { background: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.18); }
.map-key.opp { color: var(--txt); font-weight: 700; margin-top: 1px; padding-top: 7px; border-top: 1px solid var(--line); }
.map-key.web { color: var(--txt); font-weight: 700; }

.map-source { position: absolute; bottom: 16px; right: 16px; display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--line); border-radius: 99px; padding: 6px 12px;
  font-size: 11px; color: var(--txt-2); box-shadow: var(--shadow-sm); }
.map-source svg { color: var(--txt-3); }
.map-source b { color: var(--txt); font-weight: 700; }

/* zoom / pan / dibuix ------------------------------------------ */
.calc-tb-btn { display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 14px; border-radius: 99px;
  border: 1px solid var(--primary); background: var(--primary-soft); color: var(--primary); font-weight: 700; font-size: 13.5px; font-family: inherit; transition: .15s; }
.calc-tb-btn:hover { background: var(--primary); color: var(--primary-ink); }
.map-wrap { cursor: grab; }
.map-wrap.grabbing { cursor: grabbing; }
.map-wrap.drawing { cursor: crosshair; }
.map-ctrl-reset { color: var(--txt-2) !important; }
.map-ctrl-reset:hover { color: var(--primary) !important; }
.map-zoom-badge { position: absolute; top: 16px; right: 64px; background: var(--surface); border: 1px solid var(--line);
  border-radius: 99px; padding: 5px 11px; font-size: 11.5px; font-weight: 700; color: var(--txt-2);
  box-shadow: var(--shadow-sm); }
.pin { transition: transform .15s var(--ease), border-color .15s, opacity .2s, background .15s; }
.pin.dimmed { opacity: .28; filter: saturate(.4); }
.pin.dimmed:hover { opacity: .7; }
.draw-banner { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 40;
  display: flex; align-items: center; gap: 9px; background: var(--surface); border: 1px solid var(--primary);
  border-radius: 99px; padding: 8px 8px 8px 15px; font-size: 13px; font-weight: 600; color: var(--txt);
  box-shadow: var(--shadow-md); animation: float-in .2s ease; }
.draw-banner > svg { color: var(--primary); }
.draw-banner-done { display: inline-flex; align-items: center; gap: 5px; height: 30px; padding: 0 12px;
  border: none; border-radius: 99px; background: var(--primary); color: var(--primary-ink); font-weight: 700; font-size: 12.5px; }
.draw-banner-done:hover { background: var(--primary-strong); }
.draw-banner-x { width: 30px; height: 30px; border: none; border-radius: 50%; background: var(--surface-3);
  color: var(--txt-2); display: grid; place-items: center; }
.draw-banner-x:hover { background: var(--surface-hover); color: var(--txt); }

/* Leaflet ------------------------------------------------------- */
.map-leaflet { position: absolute; inset: 0; z-index: 0; }
.leaflet-container { background: var(--sea); font-family: var(--font-ui); }
.leaflet-container.drawing { cursor: crosshair !important; }
.leaflet-container.drawing .leaflet-interactive { cursor: crosshair !important; }
.leaflet-control-attribution { background: rgba(10,14,22,.55) !important; color: var(--txt-3) !important;
  font-size: 10px !important; padding: 2px 7px !important; border-radius: 6px 0 0 0; backdrop-filter: blur(4px); }
[data-theme="light"] .leaflet-control-attribution { background: rgba(255,255,255,.7) !important; }
.leaflet-control-attribution a { color: var(--txt-2) !important; }
/* pins com a divIcon */
.pin-marker { background: none !important; border: none !important; width: 0 !important; height: 0 !important; }
.pin-marker .pin { position: absolute; left: 0; top: 0; }
.map-leaflet .pin { box-shadow: var(--shadow-md); }

/* floating action buttons (mobile) */
.fab { display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 30;
  align-items: center; gap: 8px; height: 46px; padding: 0 20px; border-radius: 99px; border: none;
  background: var(--txt); color: var(--bg); font-weight: 700; font-size: 14px; box-shadow: var(--shadow-lg); }

/* ============================================================
   DETAIL DRAWER
   ============================================================ */
.detail-scrim { position: fixed; inset: 0; z-index: 80; background: rgba(5,8,13,.55); backdrop-filter: blur(3px);
  display: flex; justify-content: flex-end; animation: float-in .2s ease; }
.detail { width: 480px; max-width: 100%; height: 100%; background: var(--surface); display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg); animation: slide-in .32s var(--ease-out); }
@keyframes slide-in { from { transform: translateX(40px); opacity: .4; } to { transform: none; opacity: 1; } }
.detail-hero { position: relative; height: 290px; background-size: cover; background-position: center; flex: none; }
.detail-hero-veil { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(8,10,16,.35) 0%, transparent 30%, transparent 55%, rgba(8,10,16,.75) 100%); }
.detail-close { position: absolute; top: 16px; left: 16px; width: 38px; height: 38px; border-radius: 50%; border: none;
  background: rgba(10,14,22,.55); color: #fff; display: grid; place-items: center; backdrop-filter: blur(8px); transition: .16s; }

.detail-hero-tags { position: absolute; top: 64px; left: 16px; display: flex; gap: 6px; }

  background-position: center; cursor: pointer; opacity: .7; transition: .16s; }
.detail-thumbs button.on { border-color: #fff; opacity: 1; }

/* foto del detall: clic per ampliar */
.detail-hero-zoom { position: absolute; inset: 0; border: none; background: transparent; cursor: zoom-in; z-index: 1; }
.detail-hero-expand { position: absolute; top: 16px; right: 16px; z-index: 2; pointer-events: none;
  display: inline-flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: 999px;
  background: rgba(10,14,22,.6); backdrop-filter: blur(6px); color: #fff; font-size: 12px; font-weight: 600;
  opacity: 0; transition: opacity .18s; }
.detail-hero:hover .detail-hero-expand { opacity: 1; }
/* els controls per damunt de la capa de zoom */
.detail-close, .detail-hero-actions, .detail-hero-tags, .detail-photo-tools, .detail-thumbs { z-index: 3; }

/* Visor de foto a pantalla completa (lightbox) */
.lightbox { position: fixed; inset: 0; z-index: 1000; background: rgba(6,8,12,.94);
  display: flex; align-items: center; justify-content: center; cursor: zoom-out;
  animation: lb-in .2s var(--ease-out); }
@keyframes lb-in { from { opacity: 0; } to { opacity: 1; } }
.lightbox-img { max-width: 92vw; max-height: 84vh; object-fit: contain; border-radius: 8px;
  box-shadow: 0 24px 80px rgba(0,0,0,.6); cursor: default; }
.lightbox-close { position: absolute; top: 22px; right: 26px; width: 44px; height: 44px; border-radius: 50%;
  border: none; background: rgba(255,255,255,.12); color: #fff; display: grid; place-items: center; cursor: pointer;
  transition: background .15s; }
.lightbox-close:hover { background: rgba(255,255,255,.24); }
.lightbox-count { position: absolute; top: 30px; left: 26px; color: rgba(255,255,255,.85); font-size: 14px; font-weight: 600;
  background: rgba(255,255,255,.1); padding: 5px 12px; border-radius: 999px; }
.lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 52px; height: 52px; border-radius: 50%;
  border: none; background: rgba(255,255,255,.12); color: #fff; display: grid; place-items: center; cursor: pointer;
  transition: background .15s; }
.lightbox-nav:hover { background: rgba(255,255,255,.26); }
.lightbox-nav.prev { left: 24px; } .lightbox-nav.next { right: 24px; }
.lightbox-strip { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px;
  max-width: 90vw; overflow-x: auto; padding: 6px; }
.lightbox-strip button { width: 64px; height: 46px; flex: 0 0 auto; border-radius: 7px; border: 2px solid transparent;
  background-size: cover; background-position: center; cursor: pointer; opacity: .55; transition: .15s; }
.lightbox-strip button.on { border-color: #fff; opacity: 1; }
@media (max-width: 560px) {
  .lightbox-nav { width: 42px; height: 42px; }
  .lightbox-nav.prev { left: 10px; } .lightbox-nav.next { right: 10px; }
}

/* ============================================================

   ============================================================ */
.calc-scrim { display: flex; align-items: center; justify-content: center; padding: 26px; }

  border-radius: var(--r-lg); box-shadow: var(--shadow-lg); display: flex; flex-direction: column; overflow: hidden;
  animation: float-in .24s var(--ease-out); }
.calc-head { display: flex; align-items: center; gap: 14px; padding: 18px 22px; border-bottom: 1px solid var(--line); flex: none; }
.calc-head-ic { width: 46px; height: 46px; border-radius: 13px; display: grid; place-items: center; flex: none;
  background: linear-gradient(145deg, var(--primary), var(--primary-strong)); color: var(--primary-ink); }
.calc-head-txt { flex: 1; }

.cslider input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 99px;
  background: linear-gradient(90deg, var(--primary) var(--pct), var(--surface-3) var(--pct)); }
.cslider input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
  background: var(--primary); border: 3px solid var(--surface); box-shadow: var(--shadow-sm); cursor: pointer; }
.calc-steppers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }

/* CasaFind — Mapa real de Catalunya (Leaflet) amb heatmap, pins i dibuix de zona */
// (useRef/useState/useEffect es declaren a data.jsx)

// Centrat a tota Catalunya (el heatmap de preus cobreix tot el territori)
const CAT_CENTER = [41.79, 1.74];
const CAT_ZOOM = 8;
const CAT_BOUNDS = [[40.35, -0.30], [42.95, 3.55]];
const HEAT_STOPS = ['#1f8a6d', '#57ad6a', '#d9b441', '#e08a3c', '#d8554a'];
function colorScale(v, min, max) {
  const t = max > min ? (v - min) / (max - min) : 0.5;
  return HEAT_STOPS[Math.min(4, Math.max(0, Math.round(t * 4)))];
}

function abbrevPrice(p) {
  if (p.op === 'lloguer') return new Intl.NumberFormat('ca-ES').format(p.price) + ' €';
  if (p.price >= 1e6) return (p.price / 1e6).toFixed(1).replace('.', ',') + ' M';
  return Math.round(p.price / 1000) + ' k';
}

// punt dins polígon (coords [x,y])
function pointInPoly(x, y, pts) {
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const xi = pts[i][0], yi = pts[i][1], xj = pts[j][0], yj = pts[j][1];
    const hit = ((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
    if (hit) inside = !inside;
  }
  return inside;
}

const TILES = {
  dark: {
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}',
    ref: 'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Reference/MapServer/tile/{z}/{y}/{x}',
    attribution: 'Esri · HERE · Garmin · © OpenStreetMap',
  },
  light: {
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}',
    ref: 'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Reference/MapServer/tile/{z}/{y}/{x}',
    attribution: 'Esri · HERE · Garmin · © OpenStreetMap',
  },
};

const PIN_GLYPH = {
  pis:  '<rect x="5" y="4" width="9" height="16" rx="1"/><path d="M14 9h5v11H4"/><path d="M8 8h2.5M8 12h2.5M8 16h2.5"/>',
  casa: '<path d="M4 11.5 12 5l8 6.5"/><path d="M6 10.5V19h12v-8.5"/>',
  land: '<path d="M3 19h18"/><path d="M5 19l4-9 3 5 2.5-6L20 19"/>',
};
function glyphSvg(kind, color) {
  return '<svg class="pin-glyph" viewBox="0 0 24 24" fill="none" stroke="' + color +
    '" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">' +
    (PIN_GLYPH[kind] || PIN_GLYPH.pis) + '</svg>';
}

function pinHtml(p, { active, hover, dimmed }) {
  const th = typeTheme(p.type);
  const opp = !!p.opportunity;
  return (
    '<span class="pin' + (active ? ' active' : '') + (hover ? ' hover' : '') +
    (p.isNew ? ' is-new' : '') + (opp ? ' opp' : '') + (p.web ? ' web' : '') + (dimmed ? ' dimmed' : '') +
    '" data-op="' + p.op + '" style="--pin-type:' + th.color + '">' +
    (opp ? '<span class="pin-ring"></span>' : '') +
    '<span class="pin-glyph-wrap">' + glyphSvg(th.glyph, th.color) + '</span>' +
    '<span class="pin-price tnum">' + abbrevPrice(p) + '<span class="pin-eur">€</span></span>' +
    (p.web ? '<span class="pin-web" title="Dada real (barreig web)"></span>' : '') +
    (opp ? '<span class="pin-flame">★</span>' : (p.isNew && !p.web ? '<span class="pin-new"></span>' : '')) +
    '</span>'
  );
}

function HeatLegend({ heat }) {
  const live = heat && heat.mode === 'live';
  const min = heat ? heat.min : 1000;
  const max = heat ? heat.max : 3200;
  const mid = Math.round((min + max) / 2);
  const fmt = (n) => new Intl.NumberFormat('ca-ES').format(n);
  return (
    <div className="map-legend">
      <div className="map-legend-title">{(heat && heat.label) || 'Preu de referència'} {heat ? '· ' + heat.unit : '€/m²'}</div>
      <div className="map-legend-bar" />
      <div className="map-legend-scale tnum"><span>{fmt(min)}</span><span>{fmt(mid)}</span><span>{fmt(max)}+</span></div>
    </div>
  );
}

function MapKeys() {
  const items = [
    { t: 'pis', label: 'Pisos i àtics' },
    { t: 'casa', label: 'Cases i xalets' },
    { t: 'parcela', label: 'Terrenys i parcel·les' },
  ];
  return (
    <div className="map-keys">
      {items.map((it) => {
        const th = typeTheme(it.t);
        return (
          <span className="map-key" key={it.t}>
            <span className="map-key-dot" style={{ background: th.color }} />
            {it.label}
          </span>
        );
      })}
    </div>
  );
}

function CatMap({ items, activeId, hoverId, onHover, onSelect, layers, onToggleLayer,
  drawing, polygon, onAddPoint, onFinishPoly, onClearPolygon, theme }) {
  const elRef = useRef(null);
  const mapRef = useRef(null);
  const tileRef = useRef(null);
  const labelRef = useRef(null);
  const heatRef = useRef(null);
  const heatLabelRef = useRef(null);
  const heatRendRef = useRef(null);
  const markerLayer = useRef(null);
  const drawLayer = useRef(null);
  const [zoom, setZoom] = useState(CAT_ZOOM);
  const [ready, setReady] = useState(false);
  // Estat del heatmap: prova l'API pública en viu; si falla, mostra local
  const [heat, setHeat] = useState({
    mode: 'loading', points: [], min: 1000, max: 3200,
    unit: '€/m²', label: 'Preu de referència', year: '', source: '', dataset: '',
  });

  // callbacks sempre frescos
  const cb = useRef({});
  cb.current = { onSelect, onHover, onAddPoint, drawing };

  // init mapa (un cop)
  useEffect(() => {
    if (!window.L || !elRef.current || mapRef.current) return;
    const map = L.map(elRef.current, {
      center: CAT_CENTER, zoom: CAT_ZOOM, minZoom: 7, maxZoom: 16,
      zoomControl: false, attributionControl: true,
      maxBounds: CAT_BOUNDS, maxBoundsViscosity: 0.7,
    });
    map.attributionControl.setPrefix('');
    mapRef.current = map;

    // pane per al heatmap (per sota dels marcadors), amb blur
    map.createPane('heat');
    const hp = map.getPane('heat');
    hp.style.zIndex = 350; hp.style.pointerEvents = 'none';
    heatRendRef.current = L.svg({ pane: 'heat' });
    heatRendRef.current.addTo(map);

    // pane per als noms de pobles i ciutats (per sobre del heatmap, sota els pins)
    map.createPane('labels');
    const lp = map.getPane('labels');
    lp.style.zIndex = 360; lp.style.pointerEvents = 'none';

    heatRef.current = L.layerGroup().addTo(map);
    heatLabelRef.current = L.layerGroup().addTo(map);
    const MCG = window.L && L.markerClusterGroup;
    markerLayer.current = MCG
      ? L.markerClusterGroup({
          maxClusterRadius: 46, spiderfyOnMaxZoom: true, showCoverageOnHover: false,
          zoomToBoundsOnClick: false, spiderfyDistanceMultiplier: 2.1, removeOutsideVisibleBounds: false,
          iconCreateFunction: (cluster) => L.divIcon({
            className: 'cluster-marker', iconSize: [0, 0],
            html: '<span class="cluster-pin"><b class="tnum">' + cluster.getChildCount() + '</b> immobles</span>',
          }),
        }).addTo(map)
      : L.layerGroup().addTo(map);
    // En clicar un clúster: si els immobles estan molt junts (no es poden separar
    // fent zoom) els despleguem en ventall (spiderfy) per poder obrir-los un a un;
    // si estan repartits, fem zoom a la zona.
    if (MCG && markerLayer.current.on) {
      markerLayer.current.on('clusterclick', (a) => {
        const m = mapRef.current; if (!m) return;
        const b = a.layer.getBounds();
        let span = 0; try { span = m.distance(b.getNorthWest(), b.getSouthEast()); } catch (e) {}
        if (span < 350 || m.getZoom() >= m.getMaxZoom() - 1) a.layer.spiderfy();
        else a.layer.zoomToBounds({ padding: [50, 50], maxZoom: m.getMaxZoom() });
      });
    }
    drawLayer.current = L.layerGroup().addTo(map);

    map.on('zoom', () => setZoom(map.getZoom()));
    map.on('click', (e) => { if (cb.current.drawing) cb.current.onAddPoint([e.latlng.lat, e.latlng.lng]); });

    const ro = new ResizeObserver(() => map.invalidateSize());
    ro.observe(elRef.current);

  // teseles segons tema
  useEffect(() => {
    const map = mapRef.current; if (!map) return;
    if (tileRef.current) map.removeLayer(tileRef.current);
    const t = TILES[theme] || TILES.dark;
    tileRef.current = L.tileLayer(t.url, { attribution: t.attribution, maxZoom: 16 }).addTo(map);
    tileRef.current.bringToBack();

  useEffect(() => {

      setHeat({
        mode: 'local', reason,
        points: HEAT_POINTS.map((s) => ({ ll: s.ll, value: s.eurM2 })),
        labels: HEAT_ZONES.map((z) => ({ ll: z.ll, value: z.eurM2, name: z.municipi })),
        min: HEAT_MIN, max: HEAT_MAX, unit: '€/m²',
        label: 'Preu anuncis locals', year: SOURCES_META.refDate,
        source: 'Mostra Vallès Oriental', dataset: '',
      });
    };

      .then((d) => { if (alive) setHeat({ mode: 'live', ...d }); })

    if (!layers.heat) return;
    const live = heat.mode === 'live';
    const radius = live ? 9000 : 2600;

        radius, renderer: heatRendRef.current,
        stroke: false, fillColor: colorScale(s.value, heat.min, heat.max), fillOpacity: live ? 0.85 : 0.9,
      }).addTo(heatRef.current);

    // etiquetes numèriques per donar context. Al zoom general (vista de tota
    // Catalunya) s'amaguen per no solapar-se amb els clústers; apareixen en fer zoom.
    const z0 = map.getZoom();
    const showLabels = z0 >= (live ? 9 : 11);
    const BIG = ['Barcelona', 'Girona', 'Lleida', 'Tarragona', 'Tortosa', 'Vic', 'Manresa', 'Figueres', 'Reus', 'Mataró', 'Sabadell', 'Terrassa'];
    const labels = !showLabels ? []
      : heat.labels || (live ? (heat.points || []).filter((p) => BIG.includes(p.name)) : []);
    labels.forEach((z) => {
      if (!z.ll || z.value == null) return;
      const html = '<span class="heat-label"><b class="tnum">' +
        new Intl.NumberFormat('ca-ES').format(z.value) + '</b> ' + heat.unit + '</span>';
      L.marker(z.ll, { icon: L.divIcon({ className: 'heat-label-marker', iconSize: [0, 0], html }), interactive: false, zIndexOffset: -1000 })
        .addTo(heatLabelRef.current);
    });
  }, [layers.heat, ready, heat, zoom]);

  // marcadors
  useEffect(() => {

        className: 'pin-marker', iconSize: [0, 0],

    <div className="map-wrap">
      <div className="map-leaflet" ref={elRef} />

      {drawing && (
        <div className="draw-banner">
          <Ic.draw size={15} />
          {polyLen === 0
            ? 'Clica al mapa per marcar els vèrtexs de la teva zona'
            : `${polyLen} ${polyLen === 1 ? 'punt' : 'punts'} · ${insideCount} ${insideCount === 1 ? 'immoble' : 'immobles'} dins`}
          {polyLen >= 3 && (
            <button className="draw-banner-done" onClick={onFinishPoly}><Ic.check size={14} /> Aplica zona</button>
          )}
          <button className="draw-banner-x" onClick={onClearPolygon}><Ic.close size={14} /></button>
        </div>
      )}

      <div className="map-ctrl map-ctrl-zoom">
        <button title="Apropa" onClick={zoomIn}><Ic.plus size={18} /></button>
        <span className="map-ctrl-div" />
        <button title="Allunya" onClick={zoomOut}><Ic.minus size={18} /></button>
        <span className="map-ctrl-div" />
        <button title="Centra a la zona" onClick={reset} className="map-ctrl-reset"><Ic.target size={17} /></button>
      </div>

      <div className="map-tools">
        <button className={'map-tool' + (layers.heat ? ' on' : '')} onClick={() => onToggleLayer('heat')}>
          <Ic.layers size={16} /> Heatmap preus
        </button>
        <button className={'map-tool' + (drawing || polyLen ? ' on' : '')} onClick={() => onToggleLayer('draw')}>
          <Ic.draw size={16} /> {polyLen >= 3 && !drawing ? 'Zona activa' : 'Dibuixa zona'}
        </button>
        {polyLen > 0 && <button className="map-tool ghost" title="Esborra zona" onClick={onClearPolygon}><Ic.close size={14} /></button>}
      </div>

      <HeatLegend heat={heat} />
      <MapKeys />

      <div className="map-source">
        {heat.mode === 'live'
          ? <><span className="heat-live-dot" /> Heatmap <b>en viu</b> · {heat.source}{heat.year ? ' · ' + heat.year : ''}</>

function taxModel(p) {
  const IBI_RATE = { Barcelonès: 0.0066, Garraf: 0.0071, 'Baix Empordà': 0.0074, 'Alt Empordà': 0.0072,
    Gironès: 0.0069, 'Vallès Occidental': 0.0070, Maresme: 0.0073, Cerdanya: 0.0068, Tarragonès: 0.0078,
    Osona: 0.0075, Segrià: 0.0081, Montsià: 0.0079 };
  const valorCadastral = Math.round(p.price * 0.52);
  const ibiRate = IBI_RATE[p.comarca] || 0.0072;
  const ibi = Math.round(valorCadastral * ibiRate);
  const brossa = p.comarca === 'Barcelonès' ? 215 : 165;
  const obraNova = p.features.includes('obraNova') || (p.year && p.year >= 2025);

  if (p.op === 'lloguer') {
    const anual = p.price * 12;
    const irpfReduccio = Math.round(anual * 0.6 * 0.21); // estalvi orientatiu reducció 60%
    return { mode: 'lloguer', valorCadastral, ibi, brossa, anual, irpfReduccio };
  }
  let trans, transLbl;
  if (obraNova) { trans = Math.round(p.price * 0.10); transLbl = 'IVA 10% (obra nova)'; }
  else { trans = Math.round(p.price * 0.10); transLbl = 'ITP 10% (2a mà)'; }
  const ajd = obraNova ? Math.round(p.price * 0.015) : 0;
  const notaria = Math.round(p.price * 0.004) + 600;
  const registre = Math.round(p.price * 0.002) + 250;
  const gestoria = 400;
  const totalCompra = trans + ajd + notaria + registre + gestoria;
  return { mode: 'compra', obraNova, valorCadastral, ibi, brossa, trans, transLbl, ajd, notaria, registre, gestoria, totalCompra };
}

function downscale(file, cb) {
  const img = new Image();
  img.onload = () => {
    const max = 1100, s = Math.min(1, max / Math.max(img.width, img.height));
    const c = document.createElement('canvas');
    c.width = Math.round(img.width * s); c.height = Math.round(img.height * s);
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    cb(c.toDataURL('image/jpeg', 0.82));
  };
  img.src = URL.createObjectURL(file);
}

function eur(v) { return new Intl.NumberFormat('ca-ES').format(Math.round(v)) + ' €'; }

function ConstructionCalc({ seed, onClose }) {
  const fromParcel = seed && seed.id;
  const parcelM2 = fromParcel ? seed.m2 : 600;
  const parcelPrice = fromParcel ? seed.price : 0;

  const [m2, setM2] = useState(fromParcel ? Math.min(180, Math.round(parcelM2 * 0.35)) : 150);
  const [plantes, setPlantes] = useState(2);
  const [rooms, setRooms] = useState(3);
  const [baths, setBaths] = useState(2);
  const [type, setType] = useState('fusta');
  const [qual, setQual] = useState('estandard');
  const [soil, setSoil] = useState('semi');
  const [extras, setExtras] = useState(new Set(['fotovoltaica', 'aerotermia']));
  const [reqOpen, setReqOpen] = useState(false);
  const [reqSel, setReqSel] = useState(new Set());
  const [sent, setSent] = useState(false);

  const toggleExtra = (id) => setExtras((s) => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });

  const bt = BUILD_TYPES.find((t) => t.id === type);
  const qm = QUALITIES.find((q) => q.id === qual).mult;
  const soilF = SOILS.find((s) => s.id === soil).f;

  // PEM base = m² · €/m² · qualitat, amb recàrrec lleu per plantes
  const plantaFactor = 1 + (plantes - 1) * 0.05;
  const pem = m2 * bt.base * qm * plantaFactor;

  const comp = {
    estructura: pem * 0.38,
    cimentacio: pem * 0.09 * soilF,
    installacions: pem * 0.22,
    acabats: pem * 0.25,
    urbanitzacio: pem * 0.06,
  };
  const pemTotal = Object.values(comp).reduce((a, b) => a + b, 0);

  const extrasCost = [...extras].reduce((a, id) => a + EXTRAS.find((e) => e.id === id).cost, 0);
  const honoraris = pemTotal * 0.065;
  const icio = pemTotal * 0.04;
  const taxa = pemTotal * 0.008;
  const notaria = 2400;
  const connexions = 6500;

  const construccioTotal = pemTotal + honoraris + icio + taxa + notaria + connexions + extrasCost;
  const totalProjecte = construccioTotal + parcelPrice;
  const perM2 = construccioTotal / m2;

  const maxTot = m2 * bt.max * qm * plantaFactor * 1.18 + extrasCost;

    { l: 'Instal·lacions (elec./aigua/clima)', v: comp.installacions },
    { l: 'Acabats interiors', v: comp.acabats },
    { l: 'Urbanització parcel·la', v: comp.urbanitzacio },
    { l: 'Honoraris tècnics (arq. + aparell.)', v: honoraris, sub: true },
    { l: 'Llicència ICIO (4%) + taxa', v: icio + taxa, sub: true },
    { l: 'Notaria i registre obra nova', v: notaria, sub: true },
    { l: 'Connexió de serveis', v: connexions, sub: true },

        </header>

        <div className="calc-body">
          {/* ---------- INPUTS ---------- */}
          <div className="calc-inputs">
            <div className="calc-block">
              <div className="calc-block-t">Dimensions</div>

              <div className="calc-steppers">
                <Stepper label="Plantes" value={plantes} min={1} max={4} onChange={setPlantes} />
                <Stepper label="Habitacions" value={rooms} min={1} max={8} onChange={setRooms} />
                <Stepper label="Banys" value={baths} min={1} max={6} onChange={setBaths} />
              </div>
            </div>

            <div className="calc-block">
              <div className="calc-block-t">Sistema constructiu</div>
              <div className="calc-types">
                {BUILD_TYPES.map((t) => {
                  const I = Ic[t.icon] || Ic.building;
                  return (
                    <button key={t.id} className={'calc-type' + (type === t.id ? ' on' : '')} onClick={() => setType(t.id)}>
                      <span className="calc-type-ic"><I size={18} /></span>
                      <b>{t.label}</b>
                      <small>{t.sub}</small>
                      <span className="calc-type-price tnum">{t.min}–{t.max} €/m²</span>
                    </button>

              </div>
            </div>

            <div className="calc-row2">
              <div className="calc-block">
                <div className="calc-block-t">Nivell de qualitats</div>
                <div className="seg-pills">
                  {QUALITIES.map((q) => (
                    <button key={q.id} className={qual === q.id ? 'on' : ''} onClick={() => setQual(q.id)}>{q.label}</button>
                  ))}
                </div>
              </div>
              <div className="calc-block">
                <div className="calc-block-t">Tipus de sòl (cimentació)</div>
                <div className="seg-pills">
                  {SOILS.map((s) => (
                    <button key={s.id} className={soil === s.id ? 'on' : ''} onClick={() => setSoil(s.id)}>{s.label.split(' ')[0]}</button>

                      <span className="calc-extra-ic"><I size={16} /></span>

                      <span className="calc-extra-check">{on && <Ic.check size={12} stroke={3} />}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>

          {/* ---------- RESULTAT ---------- */}
          <aside className="calc-result">
            <div className="calc-total-card">
              <div className="calc-total-lbl">Cost estimat de construcció</div>
              <div className="calc-total tnum">{eur(construccioTotal)}</div>
              <div className="calc-total-range tnum">{eur(minTot)} – {eur(maxTot)}</div>
              <div className="calc-total-perm2 tnum">{eur(perM2)}/m² · {m2} m² · {QUALITIES.find((q) => q.id === qual).label}</div>
            </div>

            <div className="calc-breakdown">
              {rows.map((r) => (
                <div key={r.l} className={'calc-brk-row' + (r.sub ? ' sub' : '')}>
                  <span className="calc-brk-l">{r.l}{r.note && <em> · {r.note}</em>}</span>
                  <span className="calc-brk-v tnum">{eur(r.v)}</span>
                </div>
              ))}
              {extrasCost > 0 && (
                <div className="calc-brk-row sub">
                  <span className="calc-brk-l">Instal·lacions extres</span>
                  <span className="calc-brk-v tnum">{eur(extrasCost)}</span>
                </div>
              )}
            </div>

            {fromParcel && (
              <div className="calc-project">
                <div className="calc-brk-row"><span className="calc-brk-l">Compra parcel·la</span><span className="calc-brk-v tnum">{eur(parcelPrice)}</span></div>
                <div className="calc-brk-row"><span className="calc-brk-l">Construcció</span><span className="calc-brk-v tnum">{eur(construccioTotal)}</span></div>
                <div className="calc-project-total">
                  <span>Inversió total del projecte</span>
                  <b className="tnum">{eur(totalProjecte)}</b>
                </div>
              </div>
            )}

            <div className="calc-src"><Ic.info size={12} /> Rangs orientatius · actualitza segons pressupost real</div>
          </aside>
        </div>

        {/* ---------- SUBVENCIONS + DIRECTORI ---------- */}
        <div className="calc-foot-sections">
          <section className="calc-subs">
            <div className="calc-sec-t"><Ic.coins size={16} /> Ajudes i subvencions aplicables</div>
            <div className="calc-subs-grid">
              {SUBSIDIES.map((s) => (
                <div key={s.t} className="calc-sub">
                  <b>{s.t}</b>
                  <small>{s.d}</small>
                  <span className="calc-sub-src">{s.src}</span>
                </div>
              ))}
            </div>
          </section>

          <section className="calc-dir">
            <div className="calc-sec-t">
              <Ic.factory size={16} /> Constructores per al teu sistema
              <span className="calc-dir-tag">{bt.label}</span>
            </div>
            <div className="calc-companies">
              {matchCompanies.map((c) => (
                <label key={c.name} className={'calc-company' + (reqSel.has(c.name) ? ' on' : '')}>
                  <input type="checkbox" checked={reqSel.has(c.name)} onChange={() => toggleReq(c.name)} />
                  <span className="calc-company-check">{reqSel.has(c.name) && <Ic.check size={12} stroke={3} />}</span>

                    <b>{c.name}</b>
                    <small>{c.tag}</small>
                  </span>
                  <span className="calc-company-price tnum">{c.price}</span>
                  <a className="calc-company-link" href={'https://' + c.url} target="_blank" rel="noopener" onClick={(e) => e.stopPropagation()}>{c.url} ↗</a>
                </label>
              ))}
            </div>
            <div className="calc-req-bar">
              {sent ? (
                <div className="calc-sent"><Ic.check size={16} stroke={3} /> Sol·licitud enviada a {reqSel.size} {reqSel.size === 1 ? 'constructora' : 'constructores'} · rebràs ofertes al teu panell</div>
              ) : (
                <>
                  <span className="calc-req-count">{reqSel.size} {reqSel.size === 1 ? 'constructora seleccionada' : 'constructores seleccionades'}</span>

            </div>
          </section>
        </div>
      </div>
    </div>
  );
}

function Slider({ label, value, min, max, step, unit, onChange }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div className="cslider">
      <div className="cslider-head"><span>{label}</span><b className="tnum">{new Intl.NumberFormat('ca-ES').format(value)} {unit}</b></div>
      <input type="range" min={min} max={max} step={step} value={value}
        style={{ '--pct': pct + '%' }} onChange={(e) => onChange(+e.target.value)} />
    </div>
  );
}

function Stepper({ label, value, min, max, onChange }) {
  return (
    <div className="cstep">
      <span className="cstep-l">{label}</span>
      <div className="cstep-ctrl">
        <button onClick={() => onChange(Math.max(min, value - 1))} disabled={value <= min}><Ic.minus size={15} /></button>
        <b className="tnum">{value}</b>
        <button onClick={() => onChange(Math.min(max, value + 1))} disabled={value >= max}><Ic.plus size={15} /></button>
      </div>
    </div>
  );
}

  if (f.priceMax) parts.push('fins ' + new Intl.NumberFormat('ca-ES').format(f.priceMax) + ' €');

function fmtN(n) { return new Intl.NumberFormat('ca-ES').format(n); }

function relTime(ts) {
  if (!ts) return 'mai';
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 5) return 'ara mateix';
  if (s < 60) return 'fa ' + s + ' s';
  const m = Math.round(s / 60);
  if (m < 60) return 'fa ' + m + ' min';
  const h = Math.round(m / 60);
  return 'fa ' + h + ' h';
}
