name: Actualizar datos inmobiliarios

on:
  schedule:
    - cron: '0 7 */3 * *'   # Cada 3 dias a las 9h Madrid
  workflow_dispatch:          # Permite lanzarlo manualmente

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Instalar requests
        run: pip install requests

      - name: Ejecutar scraper
        run: |
          python3 << 'EOF'
          import requests, json, time
          from datetime import datetime

          APIFY_TOKEN = "${{ secrets.APIFY_TOKEN }}"
          ACTOR_ID    = "igolaizola/idealista-scraper"
          DATASET_ID  = "${{ secrets.APIFY_DATASET_ID }}"
          JSONBIN_KEY = "${{ secrets.JSONBIN_KEY }}"
          JSONBIN_BIN = "${{ secrets.JSONBIN_BIN }}"

          # 1. Lanzar actor
          print("Lanzando actor Apify...")
          r = requests.post(
              f"https://api.apify.com/v2/acts/{ACTOR_ID}/runs?token={APIFY_TOKEN}",
              json={"operation":"sale","propertyType":"homes","country":"es",
                    "location":"Valles Oriental","maxItems":100,"sortBy":"mostRecent",
                    "proxyConfiguration":{"useApifyProxy":True}},
              timeout=30
          )
          print(f"Respuesta Apify: {r.status_code} - {r.text[:300]}")
          resp = r.json()
          if "data" not in resp:
              # El actor devolvio error - usar dataset existente directamente
              print("No se pudo lanzar actor nuevo, usando dataset existente...")
              run_id = None
          else:
              run_id = resp["data"]["id"]
              print(f"Run ID: {run_id}")

          # 2. Esperar resultado
          if run_id:
              for i in range(60):
                  time.sleep(15)
                  estado = requests.get(
                      f"https://api.apify.com/v2/actor-runs/{run_id}?token={APIFY_TOKEN}",
                      timeout=15
                  ).json()["data"]["status"]
                  print(f"Estado: {estado}")
                  if estado == "SUCCEEDED": break
                  if estado in ("FAILED","ABORTED"):
                      print(f"Actor fallo: {estado}, usando dataset existente")
                      break

          # 3. Descargar resultados
          items = requests.get(
              f"https://api.apify.com/v2/datasets/{DATASET_ID}/items?token={APIFY_TOKEN}&limit=100",
              timeout=30
          ).json()
          print(f"Items: {len(items)}")

          # 4. Comparar con datos anteriores
          try:
              prev = requests.get(
                  f"https://api.jsonbin.io/v3/b/{JSONBIN_BIN}/latest",
                  headers={"X-Master-Key": JSONBIN_KEY}, timeout=15
              ).json()
              prev_urls = {p.get("url","") for p in prev.get("record",{}).get("propiedades",[])}
          except:
              prev_urls = set()

          # 5. Convertir formato
          propiedades = []
          for it in items:
              fotos = [img["url"] for img in it.get("multimedia",{}).get("images",[])[:3]]
              desc  = (it.get("description") or "")[:200]
              propiedades.append({
                  "portal":"Idealista","titulo":it.get("address",""),
                  "precio":it.get("price"),"precio_m2":it.get("priceByArea"),
                  "metros":it.get("size"),"habitaciones":it.get("rooms"),
                  "banos":it.get("bathrooms"),"tipo":it.get("propertyType",""),
                  "descripcion":desc,"ubicacion":it.get("municipality",""),
                  "lat":it.get("latitude"),"lon":it.get("longitude"),
                  "fotos":fotos,
                  "piscina":it.get("features",{}).get("hasSwimmingPool",False),
                  "jardin":it.get("features",{}).get("hasGarden",False),
                  "terraza":it.get("features",{}).get("hasTerrace",False),
                  "garaje":(it.get("parkingSpace") or {}).get("hasParkingSpace",False),
                  "url":it.get("url","")
              })

          nuevos = [p for p in propiedades if p["url"] not in prev_urls]

          # 6. Subir a JSONBin
          datos = {"ultima_actualizacion": datetime.utcnow().isoformat(),
                   "total": len(propiedades), "propiedades": propiedades}
          body  = json.dumps(datos, ensure_ascii=False)

          # Reducir si supera 95KB
          if len(body.encode()) > 95000:
              for p in propiedades:
                  p["descripcion"] = p["descripcion"][:100]
                  p["fotos"]       = p["fotos"][:1]
              datos["propiedades"] = propiedades
              body = json.dumps(datos, ensure_ascii=False)

          r = requests.put(
              f"https://api.jsonbin.io/v3/b/{JSONBIN_BIN}",
              data=body.encode("utf-8"),
              headers={"Content-Type":"application/json","X-Master-Key":JSONBIN_KEY},
              timeout=20
          )
          print(f"JSONBin status: {r.status_code}")
          print(f"RESULTADO: {len(propiedades)} propiedades, {len(nuevos)} NUEVAS")
          for n in nuevos[:10]:
              print(f"  NUEVA: {n['titulo']} - {n['precio']}EUR")
          EOF
